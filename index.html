<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>
</head>
<body x-data="timer()" :class="bgClass"
      class="min-h-screen flex flex-col items-center justify-center space-y-4 transition-colors duration-700">

    <!-- Static circle in its own SVG — never repainted by tick updates -->
    <div class="relative w-72 h-72">
        <svg class="absolute inset-0 w-full h-full" viewBox="-20 -20 240 240">
            <circle cx="100" cy="100" r="80" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25"/>
        </svg>
        <!-- Tick in a separate SVG — updates here can't affect the circle -->
        <svg class="absolute inset-0 w-full h-full" viewBox="-20 -20 240 240" x-show="state !== 'ready'">
            <g :transform="`rotate(${tickAngle}, 100, 100)`">
                <line x1="100" y1="20" x2="100" y2="34"
                      stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <text x="100" y="4" text-anchor="middle" dominant-baseline="middle"
                      :transform="`rotate(${-tickAngle}, 100, 4)`"
                      font-size="12" fill="currentColor" font-family="monospace"
                      x-text="tickMinutes"/>
            </g>
        </svg>
    </div>

    <!-- Button + hint grouped so the hint sits close to the button -->
    <div class="flex flex-col items-center space-y-2">
        <button @mousedown="state === 'ready' ? start() : startPress()" @mouseup="endPress()" @mouseleave="endPress()"
            @touchstart.prevent="state === 'ready' ? start() : startPress()" @touchend="endPress()" :class="[
                state === 'ready'  ? 'ring-stone-400' :
                state === 'focus'  ? 'ring-violet-500' : 'ring-emerald-500',
                isPressing ? 'opacity-50' : ''
            ]"
            class="px-8 py-3 rounded-full ring-1 text-sm uppercase tracking-widest select-none transition-[box-shadow,opacity,transform] duration-150 cursor-pointer"
            x-text="isPressing ? 'Canceling…' : state === 'ready' ? 'Start' : state === 'focus' ? 'Focusing' : 'On break'">
        </button>

        <!-- Always occupies space, invisible when ready -->
        <p :class="state === 'ready' ? 'invisible' : ''" class="text-xs opacity-70">
            Hold to cancel
        </p>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
